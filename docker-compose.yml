# =============================================================================
# World Monitor — Docker / Podman Compose
# =============================================================================
# Self-contained stack: app + Redis + AIS relay.
#
# Quick start:
#   cp .env.example .env        # add your API keys
#   docker compose up -d --build
#
# The app will be available at http://localhost:3000
# =============================================================================

services:

  worldmonitor:
    env_file:
      - .env.local
    build:
      context: .
      dockerfile: Dockerfile
    image: worldmonitor:latest
    container_name: worldmonitor
    ports:
      - "${WM_PORT:-3000}:8080"
    environment:
      DEPLOYMENT_MODE: "self_hosted"
      # Alpine + Node can prefer IPv6 first; in many home/office networks IPv6
      # is partially broken inside containers, causing intermittent "fetch failed".
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      UPSTASH_REDIS_REST_URL: "http://redis-rest:80"
      UPSTASH_REDIS_REST_TOKEN: "${REDIS_TOKEN:-wm-local-token}"
      LOCAL_API_PORT: "46123"
      LOCAL_API_MODE: "docker"
      LOCAL_API_CLOUD_FALLBACK: "false"
      WS_RELAY_URL: "http://ais-relay:3004"
      # Local widget-agent (runs inside ais-relay). In self-hosted we inject these server-side
      # so the browser doesn't need to store secrets in localStorage.
      WIDGET_AGENT_RELAY_BASE: "http://ais-relay:3004"
      WIDGET_AGENT_KEY: "${WIDGET_AGENT_KEY:-wm-widget-key}"
      PRO_WIDGET_KEY: "${PRO_WIDGET_KEY:-wm-pro-key}"
      # Used only for privileged/refresh paths invoked by seed scripts.
      WORLDMONITOR_VALID_KEYS: "${WORLDMONITOR_VALID_KEYS:-wm-local-token}"
    # Docker secrets (recommended for API keys — keeps them out of docker inspect).
    # Create secrets/ dir with one file per key, then uncomment below.
    # See SELF_HOSTING.md or docker-compose.override.yml for details.
    # secrets:
    #   - GROQ_API_KEY
    #   - AISSTREAM_API_KEY
    #   - FINNHUB_API_KEY
    #   - FRED_API_KEY
    #   - NASA_FIRMS_API_KEY
    #   - LLM_API_KEY
    depends_on:
      redis-rest:
        condition: service_healthy
      ais-relay:
        condition: service_started
    restart: unless-stopped

  ais-relay:
    env_file:
      - .env.local
    build:
      context: .
      dockerfile: Dockerfile.relay
    image: worldmonitor-ais-relay:latest
    container_name: worldmonitor-ais-relay
    environment:
      DEPLOYMENT_MODE: "self_hosted"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      PORT: "3004"
      UPSTASH_REDIS_REST_URL: "http://redis-rest:80"
      UPSTASH_REDIS_REST_TOKEN: "${REDIS_TOKEN:-wm-local-token}"
      # Make the relay (and widget-agent tools) call the *local* stack, not the hosted API.
      # Used for /api/* RPCs and bootstrap fetches.
      WORLDMONITOR_RPC_BASE_URL: "${WORLDMONITOR_RPC_BASE_URL:-http://worldmonitor:8080}"
      WORLDMONITOR_API_KEY: "${WORLDMONITOR_API_KEY:-wm-local-token}"
      # Widget agent auth keys (used by /widget-agent/* in the relay)
      WIDGET_AGENT_KEY: "${WIDGET_AGENT_KEY:-wm-widget-key}"
      PRO_WIDGET_KEY: "${PRO_WIDGET_KEY:-wm-pro-key}"
    depends_on:
      redis-rest:
        condition: service_healthy
    restart: unless-stopped

  seed-worker:
    env_file:
      - .env.local
    build:
      context: .
      dockerfile: Dockerfile.relay
    image: worldmonitor-ais-relay:latest
    container_name: worldmonitor-seed-worker
    entrypoint: ["/bin/sh", "/app/seed-worker.sh"]
    environment:
      DEPLOYMENT_MODE: "self_hosted"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      UPSTASH_REDIS_REST_URL: "http://redis-rest:80"
      UPSTASH_REDIS_REST_TOKEN: "${REDIS_TOKEN:-wm-local-token}"
      WORLDMONITOR_API_KEY: "${WORLDMONITOR_API_KEY:-wm-local-token}"
      WORLDMONITOR_RPC_BASE_URL: "${WORLDMONITOR_RPC_BASE_URL:-http://worldmonitor:8080}"
    depends_on:
      redis-rest:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  redis:
    image: docker.io/redis:7-alpine
    container_name: worldmonitor-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped

  redis-rest:
    env_file:
      - .env.local
    build:
      context: docker
      dockerfile: Dockerfile.redis-rest
    image: worldmonitor-redis-rest:latest
    container_name: worldmonitor-redis-rest
    ports:
      - "127.0.0.1:8079:80"
    environment:
      SRH_TOKEN: "${REDIS_TOKEN:-wm-local-token}"
      SRH_CONNECTION_STRING: "redis://redis:6379"
    depends_on:
      - redis
    healthcheck:
      # Use $$ to avoid docker-compose interpolating $SRH_TOKEN on the host.
      # redis-rest image doesn't ship curl by default; use wget (present on alpine).
      test: ["CMD-SHELL", "wget -qO- --timeout=2 --header=\"Authorization: Bearer $$SRH_TOKEN\" --header=\"Content-Type: application/json\" --post-data='[\"PING\"]' http://127.0.0.1:80/ >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

# Docker secrets — uncomment and point to your secret files.
# Example: echo "gsk_abc123" > secrets/groq_api_key.txt
# secrets:
#   GROQ_API_KEY:
#     file: ./secrets/groq_api_key.txt
#   AISSTREAM_API_KEY:
#     file: ./secrets/aisstream_api_key.txt
#   FINNHUB_API_KEY:
#     file: ./secrets/finnhub_api_key.txt
#   FRED_API_KEY:
#     file: ./secrets/fred_api_key.txt
#   NASA_FIRMS_API_KEY:
#     file: ./secrets/nasa_firms_api_key.txt
#   LLM_API_KEY:
#     file: ./secrets/llm_api_key.txt

volumes:
  redis-data:
